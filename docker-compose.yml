###############################################################################
# docker-compose.yml — xCloudVLMui Platform [bot-mac]
#
# 目標硬體：Apple Silicon Mac (M1/M2/M3/M4)
# 架構    ：ARM64 — Apple Silicon
# 推論    ：Ollama 在 host 端 (host.docker.internal:11434)
# 作業系統：macOS 13+ / Docker Desktop for Mac
#
# 此為 bot-mac 完全獨立部署：
#   project name : xcloudvlmui-mac
#   container 前綴: mac-
#   volume 前綴  : mac-
#   network      : mac-xcloud-net
#
# Port 配置 (bot-mac 專用)：
#   nginx    → 8880:80
#   backend  → 8501:8000
#   frontend → 3500:3000
#   llama-cpp→ 18580:8080 (stub)
#   vlm-webui→ 8590:8090  (stub)
#   cadvisor → 8591:8080
#   mosquitto→ 1884:1883 / 9002:9001
###############################################################################

name: xcloudvlmui-mac

x-llm-env: &llm-env
  LLM_BASE_URL:    http://host.docker.internal:11434
  LLM_MODEL:       gemma4:e4b
  LLM_CTX_SIZE:    "32768"
  LLM_MAX_TOKENS:  "2048"
  LLM_TEMPERATURE: "0.1"
  EMBED_MODEL_URL: http://host.docker.internal:11434
  EMBED_MODEL:     bge-m3
  VLM_MODEL:       qwen3-vl:30b

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  model-init:
    image: busybox:latest
    container_name: mac-model-init
    command: ["sh", "-c", "echo '[mac] Ollama on host, skip model download' && exit 0"]
    restart: "no"
    networks:
      - mac-xcloud-net

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mac-mqtt
    restart: unless-stopped
    ports:
      - "1884:1883"
      - "9002:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mac-mosquitto-data:/mosquitto/data
      - mac-mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t health/ping -m ping -q 0 2>/dev/null && echo ok || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  3
      start_period: 10s
    networks:
      - mac-xcloud-net
    logging: *default-logging

  llama-cpp:
    image: python:3.11-slim
    container_name: mac-llama-cpp-stub
    restart: unless-stopped
    command: ["python3", "-m", "http.server", "8080"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8080/\")' 2>/dev/null && echo ok"]
      interval: 10s
      timeout:  5s
      retries:  3
      start_period: 10s
    ports:
      - "18580:8080"
    networks:
      - mac-xcloud-net

  vlm-webui:
    image: python:3.11-slim
    container_name: mac-vlm-webui-stub
    restart: unless-stopped
    command: ["python3", "-m", "http.server", "8090"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8090/\")' 2>/dev/null && echo ok"]
      interval: 10s
      timeout:  5s
      retries:  3
      start_period: 10s
    ports:
      - "8590:8090"
    networks:
      - mac-xcloud-net

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    image: xcloudvlmui-mac-backend:latest
    container_name: mac-backend
    restart: unless-stopped
    environment:
      <<: *llm-env
      APP_NAME:           "xCloudVLMui Platform [bot-mac]"
      VLM_WEBUI_URL:      http://mac-vlm-webui-stub:8090
      DATABASE_URL:       sqlite+aiosqlite:////data/xcloudvlm.db
      CHROMA_PERSIST_DIR: /data/chroma
      ALLOWED_ORIGINS:    '["http://localhost:3500","http://localhost:8880","http://localhost"]'
      DEBUG:              "false"
      MQTT_BROKER_HOST:   mac-mqtt
      MQTT_BROKER_PORT:   "1883"
      MQTT_ENABLED:       "true"
      SECRET_KEY:         ${SECRET_KEY:-change-me-mac-dev}
    env_file:
      - path: ./backend/.env
        required: false
    volumes:
      - mac-backend-data:/data
      - ./backend/uploads:/app/uploads
    ports:
      - "8501:8000"
    depends_on:
      llama-cpp:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 30s
    networks:
      - mac-xcloud-net
    logging: *default-logging

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
      args:
        - NEXT_PUBLIC_API_URL=http://${HOST_IP:-localhost}:8880
        - BACKEND_URL=http://mac-backend:8000
    image: xcloudvlmui-mac-frontend:latest
    container_name: mac-frontend
    restart: unless-stopped
    environment:
      - NEXTAUTH_URL=http://${HOST_IP:-localhost}:8880
      - NEXT_PUBLIC_API_URL=http://${HOST_IP:-localhost}:8880
      - NEXT_PUBLIC_WS_URL=
      - BACKEND_URL=http://mac-backend:8000
      - NODE_ENV=production
    env_file:
      - path: ./frontend/.env.local
        required: false
    ports:
      - "3500:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 15s
    networks:
      - mac-xcloud-net
    logging: *default-logging

  nginx:
    image: nginx:1.25-alpine
    container_name: mac-nginx
    restart: unless-stopped
    ports:
      - "8880:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 15s
    networks:
      - mac-xcloud-net
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: mac-cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8591:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command:
      - "--housekeeping_interval=15s"
      - "--max_housekeeping_interval=20s"
      - "--disable_metrics=advtcp,cpuset,hugetlb,memory_numa,process,referenced_memory,resctrl,sched,tcp,udp"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 10s
    networks:
      - mac-xcloud-net
    logging: *default-logging

volumes:
  mac-backend-data:
    driver: local
  mac-mosquitto-data:
    driver: local
  mac-mosquitto-log:
    driver: local

networks:
  mac-xcloud-net:
    name: mac-xcloud-net
    driver: bridge
